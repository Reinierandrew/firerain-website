<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title-icon-white-orange">
  <title id="title-icon-white-orange">Firerain icon, white f and orange r</title>
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500&amp;display=swap');</style>
  </defs>
  <polygon points="112,60 86,105 34,105 8,60 34,15 86,15"
